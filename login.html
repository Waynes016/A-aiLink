<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Império do Açaí - Login</title>
</head>
<body bgcolor="#ffffff">

  <!-- NAVBAR -->
  <table width="100%" bgcolor="#3b0764" cellpadding="14" cellspacing="0">
    <tr>
      <td><font color="white" size="4"><b>IMPERIO DO AÇAÍ</b></font></td>
      <td align="right">
        <a href="index.html"><font color="#e9d5ff">Início</font></a> &nbsp;&nbsp;
        <a href="login.html"><font color="white"><b>Login</b></font></a>
      </td>
    </tr>
  </table>

  <br><br><br>

  <!-- FORMULÁRIO DE LOGIN -->
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">

        <table width="380" bgcolor="#f3e8ff" border="1" bordercolor="#c084fc" cellpadding="24" cellspacing="0">

          <tr bgcolor="#6b21a8">
            <td align="center">
              <font color="white" size="5"><b>🫐 Império do Açai </b></font><br>
              <font color="#e9d5ff" size="2">Acesse sua conta para continuar</font>
            </td>
          </tr>

          <tr>
            <td>
              <form method="get" action="painel.html">

                <label for="email"><font color="#3b0764"><b>E-mail:</b></font></label><br>
                <input type="email" id="email" name="email" size="38" placeholder="seu@email.com">
                <br><br>

                <label for="senha"><font color="#3b0764"><b>Senha:</b></font></label><br>
                <input type="password" id="senha" name="senha" size="38" placeholder="Digite sua senha">
                <br><br><br>

                <table width="100%">
                  <tr>
                    <td align="center">
                      <button type="submit">Entrar no Sistema</button>
                    </td>
                  </tr>
                </table>

              </form>
            </td>
          </tr>

          <tr bgcolor="#3b0764">
            <td align="center">
              <font color="#e9d5ff" size="2">Acesso restrito a produtores cadastrados.</font>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

  <br><br><br>

  <!-- RODAPÉ -->
  <table width="100%" bgcolor="#3b0764" cellpadding="16" cellspacing="0">
    <tr>
      <td align="center">
        <font color="#e9d5ff" size="2">
          © 2025 Império do Açaí &nbsp;|&nbsp; Sistema de Rastreamento da Produção de Açaí &nbsp;|&nbsp; Baixo Amazonas, Pará
        </font>
      </td>
    </tr>
  </table>

</body>
</html>
